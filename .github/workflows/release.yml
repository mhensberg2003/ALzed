name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-bridge:
    name: Build bridge (${{ matrix.target_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            target_name: linux-x86_64
            artifact_name: alzed-bridge-linux-x86_64
            binary: alzed-bridge
            ext: ""
          - os: ubuntu-latest
            target: x86_64-pc-windows-gnu
            target_name: windows-x86_64
            artifact_name: alzed-bridge-windows-x86_64.exe
            binary: alzed-bridge.exe
            ext: ".exe"
            needs_mingw: true
          - os: macos-latest
            target: aarch64-apple-darwin
            target_name: macos-arm64
            artifact_name: alzed-bridge-macos-arm64
            binary: alzed-bridge
            ext: ""
          - os: macos-13
            target: x86_64-apple-darwin
            target_name: macos-x86_64
            artifact_name: alzed-bridge-macos-x86_64
            binary: alzed-bridge
            ext: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install mingw-w64 (Windows cross-compile)
        if: matrix.needs_mingw
        run: sudo apt-get update && sudo apt-get install -y mingw-w64

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/bridge/target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('crates/bridge/Cargo.lock') }}

      - name: Build bridge
        working-directory: crates/bridge
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary
        run: |
          mkdir -p dist
          cp "crates/bridge/target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.artifact_name }}"
        shell: bash

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  package-extension:
    name: Package Zed extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pack extension source
        run: |
          mkdir -p dist
          tar -C crates -czf "dist/alzed-zed-extension.tar.gz" extension
          ls -la dist

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: alzed-zed-extension.tar.gz
          path: dist/alzed-zed-extension.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-bridge, package-extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
