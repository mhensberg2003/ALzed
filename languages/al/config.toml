name = "AL"
grammar = "al"
path_suffixes = ["al", "dal"]
line_comments = ["// "]
block_comment = ["/* ", " */"]
autoclose_before = ";:.,=}])>"
word_characters = ["_"]

[[brackets]]
start = "{"
end = "}"
close = true
newline = true

[[brackets]]
start = "["
end = "]"
close = true
newline = true

[[brackets]]
start = "("
end = ")"
close = true
newline = true

[[brackets]]
start = "\""
end = "\""
close = true
newline = false
not_in = ["comment", "string"]

[[brackets]]
start = "'"
end = "'"
close = true
newline = false
not_in = ["comment", "string"]
